name: Remove accidental Android 1.0.224

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/remove-accidental-224.yml"

permissions:
  contents: write

jobs:
  remove:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Delete accidental release and tag
        run: |
          set -euo pipefail
          gh release delete v1.0.224 \
            --repo "$GITHUB_REPOSITORY" \
            --cleanup-tag \
            --yes

      - name: Remove this one-time workflow
        run: |
          set -euo pipefail
          path=".github/workflows/remove-accidental-224.yml"
          sha="$(gh api "repos/$GITHUB_REPOSITORY/contents/$path" --jq '.sha')"
          gh api \
            --method DELETE \
            "repos/$GITHUB_REPOSITORY/contents/$path" \
            -f message="Remove completed one-time release cleanup [skip ci]" \
            -f sha="$sha" \
            -f branch=main
